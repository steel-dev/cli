# ABOUTME: Generates and polishes CHANGELOG.md entries for tagged releases.
# ABOUTME: Runs git-cliff for structure, then Claude Code with the `changelog` skill for polish.

name: Changelog

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout main (for CHANGELOG.md write target)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine tag and previous tag
        id: tags
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate mechanical changelog section
        run: |
          git-cliff --config cliff.toml \
            --tag "${{ steps.tags.outputs.tag }}" \
            --unreleased \
            --prepend CHANGELOG.md

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude polish pass
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAG: ${{ steps.tags.outputs.tag }}
          PREV_TAG: ${{ steps.tags.outputs.prev_tag }}
        run: |
          claude -p --permission-mode acceptEdits \
            "Invoke the changelog skill to polish the \`${TAG}\` section of CHANGELOG.md. \
The section was just generated by git-cliff and is at the top of the file. \
The commit range for this release is \`${PREV_TAG}..${TAG}\`. \
Edit only that section — do not touch prior releases."

      - name: Commit updated CHANGELOG.md
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changes to CHANGELOG.md — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for ${{ steps.tags.outputs.tag }} [skip ci]"
          git push origin main

      - name: Extract this release's section for GH Release body
        id: extract
        run: |
          awk -v tag="${{ steps.tags.outputs.tag }}" '
            $0 ~ "^## \\[" tag "\\]" { inside=1; next }
            inside && /^## \[/        { exit }
            inside                    { print }
          ' CHANGELOG.md > release-notes.md
          {
            echo 'notes<<EOF'
            cat release-notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Patch GitHub Release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait briefly in case release.yml hasn't created the release yet,
          # then update notes. If the release doesn't exist yet, this retries.
          for i in 1 2 3 4 5 6; do
            if gh release view "${{ steps.tags.outputs.tag }}" >/dev/null 2>&1; then
              gh release edit "${{ steps.tags.outputs.tag }}" \
                --notes-file release-notes.md
              exit 0
            fi
            echo "Release not yet created, waiting 30s... (attempt $i/6)"
            sleep 30
          done
          echo "::warning::Release ${{ steps.tags.outputs.tag }} was not created within 3 minutes; notes left unpublished."
